{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div>
        <h4 class="text-center">Produtos</h4>
    </div>
    <div class="card-group">
        {% for product in products %}
        <div class="card">
          <img src="..." class="card-img-top" alt="...">
          <div class="card-body">
            <h5 class="card-title">{{product.marca}} - {{product.nome}}</h5>
            <p class="card-text">{{product.descricao}}</p>
            <p class="card-text"><small class="text-muted">R$:{{product.preco}}</small></p>
          </div>
        </div>
        {% endfor %}
    </div>
</div>
{%endblock content %}
